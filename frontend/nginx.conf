server {
    listen 80;

    location /chat {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Disable buffering for SSE streaming.
        proxy_buffering off;
        proxy_cache off;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
