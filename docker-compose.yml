services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Not published to the host — the frontend container reverse-proxies to it
    # over the internal Docker network. Everything reaches it through :8000.
    expose:
      - "8000"
    env_file:
      - ./.env
    environment:
      - CADENCE_DB_PATH=/app/var/cadence_log.db
      # Explicit dataset path: the ./data volume mounts read-only here.
      - CADENCE_EXERCISES_PATH=/app/data/exercises.json
    volumes:
      - ./data:/app/data:ro
      - cadence-db:/app/var
    develop:
      watch:
        - path: ./backend/app
          action: sync
          target: /app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # The single public entry point: serves the SPA and reverse-proxies
    # /chat + /health to the backend. Browse + API both via http://localhost:8000.
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  cadence-db:
